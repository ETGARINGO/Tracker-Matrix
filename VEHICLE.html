<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vehicle Installment Tracker Matrix | WEB247 Solutions</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="image.png">
    <link rel="apple-touch-icon" href="image.png">

    <style>
        :root {
            --cyber-blue: #00f2ff;
            --bg-black: #050505;
            --nav-bg: #111111;
            --nav-height: 60px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-black);
            -webkit-font-smoothing: antialiased;
        }

        /* ================= NAV BAR ================= */

        .nav-bar {
            height: var(--nav-height);
            background: var(--nav-bg);
            color: var(--cyber-blue);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 2px solid var(--cyber-blue);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.25);
            position: relative;
            z-index: 100;
        }

        .nav-title {
            font-size: 13px;
            letter-spacing: 0.5px;
            font-family: 'Courier New', Courier, monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 10px;
        }

        .btn-home {
            background: transparent;
            color: var(--cyber-blue);
            border: 1px solid var(--cyber-blue);
            padding: 6px 12px;
            font-size: 11px;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 0 5px rgba(0, 242, 255, 0.5);
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            min-height: 32px;
            display: inline-flex;
            align-items: center;
        }

        .btn-home:hover, .btn-home:active {
            background: var(--cyber-blue);
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 20px var(--cyber-blue);
        }

        /* ================= IFRAME ================= */

        .content-frame {
            position: absolute;
            top: var(--nav-height);
            left: 0;
            width: 100%;
            height: calc(100% - var(--nav-height));
            border: none;
            background: #ffffff;
            /* Optimizes scrolling behaviors within iOS and Android frames */
            -webkit-overflow-scrolling: touch;
        }

        /* ================= RESPONSIVE MOBILE ADAPTATION ================= */

        @media (max-width: 480px) {
            :root {
                --nav-height: 50px;
            }
            
            .nav-title {
                font-size: 3.2vw; /* Dynamically sizes to screen real estate without spilling */
            }

            .btn-home {
                padding: 4px 10px;
                font-size: 10px;
            }
        }
    </style>
</head>

<body>

    <!-- Navigation Bar -->
    <header class="nav-bar">
        <div class="nav-title"><strong>GRANTED //</strong> TRACKER_MATRIX</div>
        <a href="https://project.web247.online/PROJECT" class="btn-home">Reload</a>
    </header>

    <!-- Main Content Matrix -->
    <iframe 
        src="https://script.google.com/macros/s/AKfycbzHFhJspXNVBEBfBVyniUA6iCHVrCcpKOexW4DumMx-AdaIrROmerFeLaHv0lwyll86/exec"
        class="content-frame"
        loading="eager"
        allow="geolocation; microphone; camera; payment"
        sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-modals">
    </iframe>

</body>
</html>
